<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: rgba(30,41,59,0.7);
      backdrop-filter: blur(10px);
      padding: 25px;
      border-radius: 16px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-top: 0;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      cursor: pointer;
      font-weight: bold;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.3s;
    }

    li.completed {
      text-decoration: line-through;
      opacity: 0.6;
    }

    .actions button {
      margin-left: 5px;
      background: #1e293b;
      color: #e2e8f0;
    }

    .filters {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
      font-size: 0.9rem;
    }

    .filters span {
      cursor: pointer;
    }

    .active-filter {
      color: #38bdf8;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="app">
  <h1>To-Do App</h1>

  <div class="input-group">
    <input id="taskInput" type="text" placeholder="Nueva tarea...">
    <button onclick="addTask()">+</button>
  </div>

  <ul id="taskList"></ul>

  <div class="filters">
    <span onclick="setFilter('all')" id="filter-all" class="active-filter">Todas</span>
    <span onclick="setFilter('active')" id="filter-active">Pendientes</span>
    <span onclick="setFilter('completed')" id="filter-completed">Completadas</span>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
  let filter = 'all';

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function renderTasks() {
    const list = document.getElementById('taskList');
    list.innerHTML = '';

    tasks
      .filter(task => {
        if (filter === 'active') return !task.completed;
        if (filter === 'completed') return task.completed;
        return true;
      })
      .forEach((task, index) => {
        const li = document.createElement('li');
        if (task.completed) li.classList.add('completed');

        li.innerHTML = `
          <span onclick="toggleTask(${index})">${task.text}</span>
          <div class="actions">
            <button onclick="deleteTask(${index})">✕</button>
          </div>
        `;

        list.appendChild(li);
      });
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    if (input.value.trim() === '') return;

    tasks.push({ text: input.value, completed: false });
    input.value = '';
    saveTasks();
    renderTasks();
  }

  function toggleTask(index) {
    tasks[index].completed = !tasks[index].completed;
    saveTasks();
    renderTasks();
  }

  function deleteTask(index) {
    tasks.splice(index, 1);
    saveTasks();
    renderTasks();
  }

  function setFilter(type) {
    filter = type;

    document.querySelectorAll('.filters span').forEach(el => el.classList.remove('active-filter'));
    document.getElementById(`filter-${type}`).classList.add('active-filter');

    renderTasks();
  }

  renderTasks();
</script>

</body>
</html>
